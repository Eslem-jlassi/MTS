services:
  phpmyadmin:
    profiles:
      - dev-tools

  backend:
    environment:
      COOKIE_SECURE: ${COMPOSE_COOKIE_SECURE:-true}
      FRONTEND_BASE_URL: ${COMPOSE_FRONTEND_BASE_URL:-https://support.example.com}
      CORS_ALLOWED_ORIGINS: ${COMPOSE_CORS_ALLOWED_ORIGINS:-https://support.example.com}
      WS_ALLOWED_ORIGIN_PATTERNS: ${COMPOSE_WS_ALLOWED_ORIGIN_PATTERNS:-https://support.example.com}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${COMPOSE_AUTH_REQUIRE_EMAIL_VERIFICATION:-true}
      MAIL_ENABLED: ${COMPOSE_MAIL_ENABLED:-true}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${COMPOSE_MANAGEMENT_HEALTH_MAIL_ENABLED:-false}

  frontend:
    build:
      args:
        REACT_APP_API_URL: ${COMPOSE_REACT_APP_API_URL:-https://api.example.com/api}
        REACT_APP_GOOGLE_OAUTH_ALLOWED_ORIGINS: ${COMPOSE_REACT_APP_GOOGLE_OAUTH_ALLOWED_ORIGINS:-https://support.example.com}
