# =============================================================================
# MTS TELECOM - H2 In-Memory Database Profile (for testing/demo)
# =============================================================================

spring:
  datasource:
    url: jdbc:h2:mem:mts_telecom_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # Disable Flyway for H2 - schema is created by JPA ddl-auto and data by DataInitializer
  flyway:
    enabled: false

  # Disable SQL init scripts (data.sql) for H2 - DataInitializer handles seed data
  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

cookie:
  secure: ${COOKIE_SECURE:false}
