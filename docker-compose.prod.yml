name: mts-prod

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      MYSQL_ROOT_PASSWORD: ${COMPOSE_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${COMPOSE_DB_NAME:-mts_telecom_db}
      MYSQL_USER: ${COMPOSE_DB_USERNAME}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
    volumes:
      - prod_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${COMPOSE_DB_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  sentiment-service:
    build:
      context: ./sentiment-service
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  duplicate-service:
    build:
      context: ./duplicate-service
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  ai-chatbot:
    build:
      context: ./ai-chatbot
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    depends_on:
      mysql:
        condition: service_healthy
      sentiment-service:
        condition: service_healthy
      duplicate-service:
        condition: service_healthy
      ai-chatbot:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${COMPOSE_DB_NAME:-mts_telecom_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris&useUnicode=true&characterEncoding=utf8
      DB_USERNAME: ${COMPOSE_DB_USERNAME}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD}
      JWT_SECRET: ${COMPOSE_JWT_SECRET}
      GOOGLE_CLIENT_ID: ${COMPOSE_GOOGLE_CLIENT_ID:-}
      COOKIE_SECURE: ${COMPOSE_COOKIE_SECURE:-true}
      ALLOW_INTERNAL_SIGNUP: "false"
      AUTH_EXPOSE_TOKENS_IN_BODY: "false"
      AI_AUTOSTART_ENABLED: "false"
      FRONTEND_BASE_URL: ${COMPOSE_FRONTEND_BASE_URL}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${COMPOSE_AUTH_REQUIRE_EMAIL_VERIFICATION:-true}
      CORS_ALLOWED_ORIGINS: ${COMPOSE_CORS_ALLOWED_ORIGINS}
      WS_ALLOWED_ORIGIN_PATTERNS: ${COMPOSE_WS_ALLOWED_ORIGIN_PATTERNS}
      MAIL_ENABLED: ${COMPOSE_MAIL_ENABLED:-false}
      MAIL_HOST: ${COMPOSE_MAIL_HOST:-}
      MAIL_PORT: ${COMPOSE_MAIL_PORT:-587}
      MAIL_USERNAME: ${COMPOSE_MAIL_USERNAME:-}
      MAIL_PASSWORD: ${COMPOSE_MAIL_PASSWORD:-}
      MAIL_FROM: ${COMPOSE_MAIL_FROM:-no-reply@example.com}
      MAIL_FROM_NAME: ${COMPOSE_MAIL_FROM_NAME:-MTS Telecom}
      MAIL_SMTP_AUTH: ${COMPOSE_MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${COMPOSE_MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${COMPOSE_MAIL_SMTP_STARTTLS_REQUIRED:-false}
      MAIL_SMTP_CONNECTION_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_CONNECTION_TIMEOUT_MS:-5000}
      MAIL_SMTP_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_TIMEOUT_MS:-10000}
      MAIL_SMTP_WRITE_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_WRITE_TIMEOUT_MS:-10000}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${COMPOSE_MANAGEMENT_HEALTH_MAIL_ENABLED:-false}
      AI_SENTIMENT_BASE_URL: ${COMPOSE_AI_SENTIMENT_BASE_URL:-http://sentiment-service:8000}
      AI_DUPLICATE_BASE_URL: ${COMPOSE_AI_DUPLICATE_BASE_URL:-http://duplicate-service:8001}
      AI_CHATBOT_BASE_URL: ${COMPOSE_AI_CHATBOT_BASE_URL:-http://ai-chatbot:8002}
      TICKETS_UPLOAD_DIR: ${COMPOSE_TICKETS_UPLOAD_DIR:-/app/uploads/tickets}
      USERS_AVATAR_UPLOAD_DIR: ${COMPOSE_USERS_AVATAR_UPLOAD_DIR:-/app/uploads/avatars}
      REPORTS_UPLOAD_DIR: ${COMPOSE_REPORTS_UPLOAD_DIR:-/app/uploads/reports}
      SERVER_FORWARD_HEADERS_STRATEGY: ${COMPOSE_SERVER_FORWARD_HEADERS_STRATEGY:-framework}
      JAVA_OPTS: ${COMPOSE_BACKEND_JAVA_OPTS:--Xms256m -Xmx768m}
    ports:
      - "${COMPOSE_BACKEND_PORT:-8080}:8080"
    volumes:
      - prod_backend_uploads:/app/uploads
      - prod_backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile.demo
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${COMPOSE_FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  prod_mysql_data:
  prod_backend_uploads:
  prod_backend_logs:
