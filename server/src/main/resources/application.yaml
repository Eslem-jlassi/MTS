server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true
  error:
    include-message: always
    include-stacktrace: never

spring:
  config:
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mts_telecom_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mts2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true


  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        type:
          '[prefer_native_enum_types]': false

  sql:
    init:
      mode: never

  messages:
    encoding: UTF-8

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  mail:
    host: ${MAIL_HOST:${COMPOSE_MAIL_HOST:}}
    port: ${MAIL_PORT:${COMPOSE_MAIL_PORT:587}}
    username: ${MAIL_USERNAME:${COMPOSE_MAIL_USERNAME:}}
    password: ${MAIL_PASSWORD:${COMPOSE_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:${COMPOSE_MAIL_SMTP_AUTH:true}}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:${COMPOSE_MAIL_SMTP_STARTTLS_ENABLE:true}}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:${COMPOSE_MAIL_SMTP_STARTTLS_REQUIRED:false}}
          connectiontimeout: ${MAIL_SMTP_CONNECTION_TIMEOUT_MS:${COMPOSE_MAIL_SMTP_CONNECTION_TIMEOUT_MS:5000}}
          timeout: ${MAIL_SMTP_TIMEOUT_MS:${COMPOSE_MAIL_SMTP_TIMEOUT_MS:10000}}
          writetimeout: ${MAIL_SMTP_WRITE_TIMEOUT_MS:${COMPOSE_MAIL_SMTP_WRITE_TIMEOUT_MS:10000}}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:${COMPOSE_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}}
  # SECURITY WARNING: In production, restrict to specific domains only
  # Example: https://app.example.com,https://admin.example.com

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_MTSTelecom2026_SecureDefaultForDevelopmentOnly_NeverUseInProduction}
  # CRITICAL SECURITY WARNING: 
  # - NEVER use default secret in production!
  # - Generate a strong secret: openssl rand -base64 64
  # - Store in environment variable: export JWT_SECRET=<your-secret>
  # - Minimum length: 256 bits (43+ characters in base64)
  access-token:
    expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}  # 15 minutes
  refresh-token:
    expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

logging:
  level:
    root: INFO
    '[com.billcom.mts]': DEBUG
    '[org.springframework.security]': WARN
    '[org.hibernate.SQL]': ${SQL_LOGGING_LEVEL:WARN}  # Set to DEBUG only in development
    '[org.hibernate.type.descriptor.sql.BasicBinder]': ${SQL_PARAM_LOGGING:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mts-telecom.log
    max-size: 10MB
    max-history: 30

# Resilience4j - Rate Limiting Configuration
resilience4j:
  ratelimiter:
    instances:
      # Login rate limiting - prevent brute force attacks
      loginRateLimiter:
        limitForPeriod: 5  # 5 attempts
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0  # fail immediately if limit exceeded
      # API rate limiting - general protection
      apiRateLimiter:
        limitForPeriod: 100  # 100 requests
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0
      # Ticket creation rate limiting
      createTicketRateLimiter:
        limitForPeriod: 10  # 10 tickets
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0

# Google OAuth - Client ID (same as frontend REACT_APP_GOOGLE_OAUTH_CLIENT_ID) for ID token verification
app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:${COMPOSE_GOOGLE_CLIENT_ID:}}
  frontend-base-url: ${FRONTEND_BASE_URL:${COMPOSE_FRONTEND_BASE_URL:http://localhost:3000}}
  mail:
    enabled: ${MAIL_ENABLED:${COMPOSE_MAIL_ENABLED:false}}
    from: ${MAIL_FROM:${COMPOSE_MAIL_FROM:no-reply@mts-telecom.local}}
    from-name: ${MAIL_FROM_NAME:${COMPOSE_MAIL_FROM_NAME:MTS Telecom}}
  auth:
    require-email-verification: ${AUTH_REQUIRE_EMAIL_VERIFICATION:${COMPOSE_AUTH_REQUIRE_EMAIL_VERIFICATION:${MAIL_ENABLED:${COMPOSE_MAIL_ENABLED:false}}}}
    email-verification:
      expiration-hours: ${EMAIL_VERIFICATION_EXPIRATION_HOURS:24}
    password-reset:
      expiration-hours: ${PASSWORD_RESET_EXPIRATION_HOURS:1}
    sensitive-action:
      code-expiration-minutes: ${AUTH_SENSITIVE_ACTION_CODE_EXPIRATION_MINUTES:10}
    rate-limit:
      login:
        max-attempts: ${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
        window-seconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
      register:
        max-attempts: ${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:5}
        window-seconds: ${AUTH_RATE_LIMIT_REGISTER_WINDOW_SECONDS:300}
      forgot-password:
        max-attempts: ${AUTH_RATE_LIMIT_FORGOT_MAX_ATTEMPTS:10}
        window-seconds: ${AUTH_RATE_LIMIT_FORGOT_WINDOW_SECONDS:60}
      reset-password:
        max-attempts: ${AUTH_RATE_LIMIT_RESET_MAX_ATTEMPTS:20}
        window-seconds: ${AUTH_RATE_LIMIT_RESET_WINDOW_SECONDS:60}
      resend-verification:
        max-attempts: ${AUTH_RATE_LIMIT_RESEND_MAX_ATTEMPTS:10}
        window-seconds: ${AUTH_RATE_LIMIT_RESEND_WINDOW_SECONDS:60}

# Cookie configuration
cookie:
  secure: ${COOKIE_SECURE:${COMPOSE_COOKIE_SECURE:true}}  # Override to false only for local HTTP development

auth:
  expose-tokens-in-body: ${AUTH_EXPOSE_TOKENS_IN_BODY:${COMPOSE_AUTH_EXPOSE_TOKENS_IN_BODY:false}}

websocket:
  allowed-origin-patterns: ${WS_ALLOWED_ORIGIN_PATTERNS:${COMPOSE_WS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:3001}}

mts:
  allow-internal-signup: ${ALLOW_INTERNAL_SIGNUP:false}
  ticket:
    prefix: "TKT"
    number-format: "%s-%d-%05d"
  sla:
    critical-hours: 1
    high-hours: 4
    medium-hours: 24
    low-hours: 72

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

ai:
  http:
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${AI_READ_TIMEOUT_MS:10000}
  autostart:
    enabled: ${AI_AUTOSTART_ENABLED:true}
    wait-timeout-ms: ${AI_AUTOSTART_WAIT_TIMEOUT_MS:180000}
    poll-interval-ms: ${AI_AUTOSTART_POLL_INTERVAL_MS:1000}
  sentiment:
    base-url: ${AI_SENTIMENT_BASE_URL:http://127.0.0.1:8000}
  duplicate:
    base-url: ${AI_DUPLICATE_BASE_URL:http://127.0.0.1:8001}
  chatbot:
    base-url: ${AI_CHATBOT_BASE_URL:http://127.0.0.1:8002}
