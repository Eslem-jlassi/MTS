# =============================================================================
# MTS TELECOM SUPERVISION SYSTEM - Docker Compose
# Billcom Consulting - PFE 2026
# =============================================================================
# Usage:
#   docker-compose up -d          → Démarre MySQL
#   docker-compose down           → Arrête MySQL
#   docker-compose down -v        → Arrête + supprime les données
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # MySQL 8.0 - Base de données principale
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: mts-mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-mts2026}
      MYSQL_DATABASE: ${DB_NAME:-mts_telecom_db}
      MYSQL_USER: ${DB_USERNAME:-mts_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mts_password}
    volumes:
      - mts-mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-mts2026}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # phpMyAdmin - Interface web pour gérer MySQL (optionnel)
  # ===========================================================================
  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: mts-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-mts2026}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mts-mysql-data:
    driver: local
