services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    ports:
      - "${COMPOSE_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${COMPOSE_DB_ROOT_PASSWORD:-mts2026}
      MYSQL_DATABASE: ${COMPOSE_DB_NAME:-mts_telecom_db}
      MYSQL_USER: ${COMPOSE_DB_USERNAME:-mts_user}
      MYSQL_PASSWORD: ${COMPOSE_DB_PASSWORD:-mts_password}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=caching_sha2_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${COMPOSE_DB_ROOT_PASSWORD:-mts2026}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${COMPOSE_DB_ROOT_PASSWORD:-mts2026}
    depends_on:
      mysql:
        condition: service_healthy

  sentiment-service:
    build:
      context: ../sentiment-service
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  duplicate-service:
    build:
      context: ../duplicate-service
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  ai-chatbot:
    build:
      context: ../ai-chatbot
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"
    depends_on:
      mysql:
        condition: service_healthy
      sentiment-service:
        condition: service_healthy
      duplicate-service:
        condition: service_healthy
      ai-chatbot:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${COMPOSE_DB_NAME:-mts_telecom_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Paris&useUnicode=true&characterEncoding=utf8
      DB_USERNAME: ${COMPOSE_DB_USERNAME:-mts_user}
      DB_PASSWORD: ${COMPOSE_DB_PASSWORD:-mts_password}
      JWT_SECRET: ${COMPOSE_JWT_SECRET:-MTS_BILLCOM_2026_Hx7pL9mNqR3sT6vW8yZ2aB5cD0eF4gHjKlMnPqRsTuVwXyZ1a2B3c4D5e6F7g8H9i0JkLmNoPqRs}
      GOOGLE_CLIENT_ID: ${COMPOSE_GOOGLE_CLIENT_ID:-}
      COOKIE_SECURE: "false"
      ALLOW_INTERNAL_SIGNUP: "false"
      AUTH_EXPOSE_TOKENS_IN_BODY: "false"
      AI_AUTOSTART_ENABLED: "false"
      FRONTEND_BASE_URL: ${COMPOSE_FRONTEND_BASE_URL:-http://localhost:3000}
      AUTH_REQUIRE_EMAIL_VERIFICATION: ${COMPOSE_AUTH_REQUIRE_EMAIL_VERIFICATION:-false}
      CORS_ALLOWED_ORIGINS: ${COMPOSE_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      WS_ALLOWED_ORIGIN_PATTERNS: ${COMPOSE_WS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000,http://127.0.0.1:3000}
      MAIL_ENABLED: ${COMPOSE_MAIL_ENABLED:-false}
      MAIL_HOST: ${COMPOSE_MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${COMPOSE_MAIL_PORT:-587}
      MAIL_USERNAME: ${COMPOSE_MAIL_USERNAME:-}
      MAIL_PASSWORD: ${COMPOSE_MAIL_PASSWORD:-}
      MAIL_FROM: ${COMPOSE_MAIL_FROM:-no-reply@mts-telecom.local}
      MAIL_FROM_NAME: ${COMPOSE_MAIL_FROM_NAME:-MTS Telecom}
      MAIL_SMTP_AUTH: ${COMPOSE_MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS_ENABLE: ${COMPOSE_MAIL_SMTP_STARTTLS_ENABLE:-true}
      MAIL_SMTP_STARTTLS_REQUIRED: ${COMPOSE_MAIL_SMTP_STARTTLS_REQUIRED:-false}
      MAIL_SMTP_CONNECTION_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_CONNECTION_TIMEOUT_MS:-5000}
      MAIL_SMTP_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_TIMEOUT_MS:-10000}
      MAIL_SMTP_WRITE_TIMEOUT_MS: ${COMPOSE_MAIL_SMTP_WRITE_TIMEOUT_MS:-10000}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
      AI_SENTIMENT_BASE_URL: http://sentiment-service:8000
      AI_DUPLICATE_BASE_URL: http://duplicate-service:8001
      AI_CHATBOT_BASE_URL: http://ai-chatbot:8002
      TICKETS_UPLOAD_DIR: ${COMPOSE_TICKETS_UPLOAD_DIR:-/app/uploads/tickets}
      USERS_AVATAR_UPLOAD_DIR: ${COMPOSE_USERS_AVATAR_UPLOAD_DIR:-/app/uploads/avatars}
      REPORTS_UPLOAD_DIR: ${COMPOSE_REPORTS_UPLOAD_DIR:-/app/uploads/reports}
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ../client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${COMPOSE_REACT_APP_API_URL:-http://localhost:8080/api}
        REACT_APP_GOOGLE_OAUTH_CLIENT_ID: ${COMPOSE_REACT_APP_GOOGLE_OAUTH_CLIENT_ID:-}
        REACT_APP_GOOGLE_OAUTH_ENABLED: ${COMPOSE_REACT_APP_GOOGLE_OAUTH_ENABLED:-true}
        REACT_APP_GOOGLE_OAUTH_ALLOWED_ORIGINS: ${COMPOSE_REACT_APP_GOOGLE_OAUTH_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
        REACT_APP_DEMO_MODE: "false"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mysql_data:
  backend_uploads:
  backend_logs:
