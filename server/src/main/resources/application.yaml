server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/mts_telecom_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Tunis&useUnicode=true&characterEncoding=utf8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mts2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true


  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        '[format_sql]': true
        type:
          '[prefer_native_enum_types]': false

  sql:
    init:
      mode: never

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  # SECURITY WARNING: In production, restrict to specific domains only
  # Example: https://app.example.com,https://admin.example.com

jwt:
  secret: ${JWT_SECRET:CHANGE_THIS_IN_PRODUCTION_MTSTelecom2026_SecureDefaultForDevelopmentOnly_NeverUseInProduction}
  # CRITICAL SECURITY WARNING: 
  # - NEVER use default secret in production!
  # - Generate a strong secret: openssl rand -base64 64
  # - Store in environment variable: export JWT_SECRET=<your-secret>
  # - Minimum length: 256 bits (43+ characters in base64)
  access-token:
    expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}  # 15 minutes
  refresh-token:
    expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

logging:
  level:
    root: INFO
    '[com.billcom.mts]': DEBUG
    '[org.springframework.security]': WARN
    '[org.hibernate.SQL]': ${SQL_LOGGING_LEVEL:WARN}  # Set to DEBUG only in development
    '[org.hibernate.type.descriptor.sql.BasicBinder]': ${SQL_PARAM_LOGGING:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{requestId:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/mts-telecom.log
    max-size: 10MB
    max-history: 30

# Resilience4j - Rate Limiting Configuration
resilience4j:
  ratelimiter:
    instances:
      # Login rate limiting - prevent brute force attacks
      loginRateLimiter:
        limitForPeriod: 5  # 5 attempts
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0  # fail immediately if limit exceeded
      # API rate limiting - general protection
      apiRateLimiter:
        limitForPeriod: 100  # 100 requests
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0
      # Ticket creation rate limiting
      createTicketRateLimiter:
        limitForPeriod: 10  # 10 tickets
        limitRefreshPeriod: 60s  # per minute
        timeoutDuration: 0

# Google OAuth - Client ID (same as frontend REACT_APP_GOOGLE_OAUTH_CLIENT_ID) for ID token verification
app:
  google:
    client-id: ${GOOGLE_CLIENT_ID:348931794377-0ev901vacm9h6fnqfuqs5iv7kiikchge.apps.googleusercontent.com}

# Cookie configuration
cookie:
  secure: ${COOKIE_SECURE:false}  # Set to true in production (HTTPS)

mts:
  allow-internal-signup: ${ALLOW_INTERNAL_SIGNUP:true}
  ticket:
    prefix: "TKT"
    number-format: "%s-%d-%05d"
  sla:
    critical-hours: 1
    high-hours: 4
    medium-hours: 24
    low-hours: 72

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
